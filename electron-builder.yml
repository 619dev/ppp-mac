appId: com.paperphone.plus.desktop
productName: PaperPhone Plus
directories:
  buildResources: build
  output: release/${version}

files:
  - dist-electron/**/*
  - dist/**/*

# Disable auto-update publish (no update server configured)
publish: null

# macOS
mac:
  category: public.app-category.social-networking
  icon: build/icon.icns
  target:
    - target: dmg
      arch:
        - universal
    - target: zip
      arch:
        - universal
  darkModeSupport: true
  hardenedRuntime: true

dmg:
  artifactName: ${productName}-${version}-macOS.${ext}
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
