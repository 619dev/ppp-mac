appId: com.paperphone.plus.desktop
productName: PaperPhonePlus
directories:
  buildResources: build
  output: release/${version}

files:
  - dist-electron/**/*
  - dist/**/*

# Disable auto-update publish (no update server configured)
publish: null

# macOS
mac:
  category: public.app-category.social-networking
  icon: build/icon.icns
  target:
    - target: dmg
      arch:
        - universal
    - target: zip
      arch:
        - universal
  darkModeSupport: true
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  identity: "YIJIE LIU (J69ASPPPY9)"
  notarize: false
  extendInfo:
    NSCameraUsageDescription: PaperPhonePlus 需要访问摄像头以进行视频会议。
    NSMicrophoneUsageDescription: PaperPhonePlus 需要访问麦克风以进行语音和视频会议。

dmg:
  artifactName: ${productName}-${version}-macOS.${ext}
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
